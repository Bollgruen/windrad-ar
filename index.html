<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Windrad AR</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    AFRAME.registerComponent('gradient-mast', {
      init: function () {
        const canvas = document.createElement('canvas');
        canvas.width = 2;
        canvas.height = 256;
        const ctx = canvas.getContext('2d');
        const grad = ctx.createLinearGradient(0, 256, 0, 0);
        grad.addColorStop(0.0, 'rgba(255,255,255,0.0)');
        grad.addColorStop(0.3, 'rgba(255,255,255,0.3)');
        grad.addColorStop(0.5, 'rgba(255,255,255,1.0)');
        grad.addColorStop(1.0, 'rgba(255,255,255,1.0)');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, 2, 256);
        const texture = new THREE.CanvasTexture(canvas);
        this.el.getObject3D('mesh').material = new THREE.MeshBasicMaterial({
          map: texture, transparent: true, side: THREE.DoubleSide
        });
      }
    });
  </script>

  <style>
    body { margin: 0; overflow: hidden; font-family: sans-serif; }

    #map-screen {
      position: fixed; inset: 0; z-index: 100;
      display: flex; flex-direction: column;
    }
    #picker-map { flex: 1; }
    #map-toolbar {
      background: #1c1c1e; padding: 10px 12px;
      display: flex; flex-direction: column; gap: 8px;
    }
    #search-row { display: flex; gap: 8px; }
    #search-input {
      flex: 1; padding: 8px 12px; border-radius: 8px; border: none;
      font-size: 15px; background: #2c2c2e; color: white;
    }
    #search-input::placeholder { color: #888; }
    #search-btn {
      padding: 8px 14px; border-radius: 8px; border: none;
      background: #007aff; color: white; font-size: 15px;
    }

    .setting-row {
      display: flex; align-items: center; gap: 8px;
      color: white; font-size: 13px;
    }
    .setting-row label { width: 160px; }
    .setting-row input[type=range] { flex: 1; }
    .setting-row span { width: 50px; text-align: right; color: #aaa; }

    #coords-display {
      color: #aaa; font-size: 13px; text-align: center; min-height: 18px;
    }
    #plaetze-anzeige {
      color: #888; font-size: 12px; text-align: center;
    }
    .btn-green {
      padding: 12px; border-radius: 10px; border: none;
      background: #34c759; color: white; font-size: 16px; font-weight: bold;
    }
    .btn-blue {
      padding: 10px; border-radius: 10px; border: none;
      background: #007aff; color: white; font-size: 15px; font-weight: bold;
    }
    #btn-weiteres { display: none; }
    #btn-ar-start { display: none; }
    #hint { color: #888; font-size: 13px; text-align: center; }

    #marker-liste { display: flex; flex-wrap: wrap; gap: 4px; }
    .marker-chip {
      background: #2c2c2e; color: #aaa; font-size: 11px;
      padding: 3px 8px; border-radius: 12px;
    }

    /* AR */
    #minimap {
      position: fixed; top: 10px; right: 10px;
      width: 180px; height: 180px;
      border: 2px solid white; border-radius: 8px;
      overflow: hidden; z-index: 9999;
    }
    #status {
      position: fixed; bottom: 10px; left: 10px;
      background: rgba(0,0,0,0.6); color: white;
      padding: 8px 12px; border-radius: 8px;
      font-size: 13px; z-index: 9999;
    }

    /* Querformat-Warnung */
    #orientation-warning {
      display: none;
      position: fixed; inset: 0; z-index: 99999;
      background: rgba(0,0,0,0.85);
      color: white; font-size: 18px;
      flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; text-align: center; padding: 40px;
    }
    #orientation-warning.visible { display: flex; }
  </style>
</head>
<body>

  <!-- QUERFORMAT WARNUNG -->
  <div id="orientation-warning">
    <div style="font-size:48px">📱</div>
    <div>Bitte Gerät ins <strong>Hochformat</strong> drehen</div>
    <div style="font-size:13px; color:#aaa">Im Querformat ist der Kompass um 90° versetzt und das Windrad erscheint an der falschen Stelle</div>
  </div>

  <!-- KARTEN-SCREEN -->
  <div id="map-screen">
    <div id="picker-map"></div>
    <div id="map-toolbar">

      <div id="search-row">
        <input id="search-input" type="text" placeholder="Ort suchen...">
        <button id="search-btn">🔍</button>
      </div>

      <div class="setting-row">
        <label>🏗 Nabenhöhe</label>
        <input type="range" id="nabenhoehe" min="50" max="250" value="130" step="5">
        <span id="nabenhoehe-val">130m</span>
      </div>
      <div class="setting-row">
        <label>💨 Rotordurchmesser</label>
        <input type="range" id="blattlaenge" min="40" max="240" value="150" step="10">
        <span id="blattlaenge-val">150m</span>
      </div>

      <div id="coords-display">Tippe auf die Karte um ein Windrad zu platzieren</div>
      <div id="marker-liste"></div>
      <div id="plaetze-anzeige"></div>

      <button class="btn-blue" id="btn-weiteres">➕ Weiteres Windrad platzieren</button>
      <button class="btn-green" id="btn-ar-start">✅ AR starten</button>
      <div id="hint">Zum Zoomen: zwei Finger</div>

    </div>
  </div>

  <!-- AR SCREEN -->
  <div id="ar-screen" style="display:none;">
    <a-scene
      vr-mode-ui="enabled: false"
      arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false"
    >
      <a-camera gps-camera rotation-reader></a-camera>
    </a-scene>
    <div id="minimap"></div>
    <div id="status">📍 GPS: warte...</div>
  </div>

  <script>
    const MAX_WINDRAEDER = 5;
    let windraeder = [];
    let pickerMarkers = [];
    let currentMarker = null;
    let currentLatLng = null;
    let userElevation = null;

    // ── QUERFORMAT ERKENNUNG ─────────────────────────
    function checkOrientation() {
      const isLandscape = window.innerWidth > window.innerHeight;
      const warning = document.getElementById('orientation-warning');
      if (isLandscape) warning.classList.add('visible');
      else warning.classList.remove('visible');
    }
    window.addEventListener('resize', checkOrientation);
    window.addEventListener('orientationchange', checkOrientation);
    checkOrientation();

    // ── EINSTELLUNGEN ────────────────────────────────
    const nahbenEl  = document.getElementById('nabenhoehe');
    const blattEl   = document.getElementById('blattlaenge');
    const nahbenVal = document.getElementById('nabenhoehe-val');
    const blattVal  = document.getElementById('blattlaenge-val');

    nahbenEl.addEventListener('input', () => nahbenVal.textContent = nahbenEl.value + 'm');
    blattEl.addEventListener('input',  () => blattVal.textContent  = blattEl.value  + 'm');

    function getSettings() {
      return {
        hubHeight:   parseInt(nahbenEl.value),
        bladeLength: parseInt(blattEl.value) / 2  // Durchmesser → Radius
      };
    }

    // ── PICKER MAP ───────────────────────────────────
    const pickerMap = L.map('picker-map').setView([47.97, 11.45], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(pickerMap);

    navigator.geolocation.getCurrentPosition(pos => {
      pickerMap.setView([pos.coords.latitude, pos.coords.longitude], 14);
    });

    pickerMap.on('click', e => {
      const { lat, lng } = e.latlng;
      currentLatLng = { lat, lng };

      if (currentMarker) currentMarker.setLatLng([lat, lng]);
      else currentMarker = L.marker([lat, lng], {
        icon: L.divIcon({ html: '📍', iconSize: [24,24], className: '' })
      }).addTo(pickerMap);

      document.getElementById('coords-display').textContent =
        `📍 ${lat.toFixed(5)}, ${lng.toFixed(5)}`;
      updateButtons();
    });

    function updateButtons() {
      const count = windraeder.length;
      const hasCurrent = currentLatLng !== null;

      document.getElementById('btn-weiteres').style.display =
        hasCurrent && count < MAX_WINDRAEDER - 1 ? 'block' : 'none';
      document.getElementById('btn-ar-start').style.display =
        hasCurrent ? 'block' : 'none';
      document.getElementById('plaetze-anzeige').textContent =
        count > 0 ? `${count} Windrad${count > 1 ? 'räder' : ''} bereits platziert` : '';

      const liste = document.getElementById('marker-liste');
      liste.innerHTML = windraeder.map((w, i) =>
        `<span class="marker-chip">🌀 ${i+1}: ${w.lat.toFixed(4)}, ${w.lng.toFixed(4)}</span>`
      ).join('');
    }

    document.getElementById('btn-weiteres').addEventListener('click', () => {
      if (!currentLatLng) return;
      windraeder.push(currentLatLng);

      if (currentMarker) {
        currentMarker.setIcon(L.divIcon({
          html: `🌀<span style="font-size:10px;color:white">${windraeder.length}</span>`,
          iconSize: [28,28], className: ''
        }));
        pickerMarkers.push(currentMarker);
        currentMarker = null;
      }

      currentLatLng = null;
      document.getElementById('coords-display').textContent =
        'Tippe auf die Karte für das nächste Windrad';
      updateButtons();
    });

    // Suche
    document.getElementById('search-btn').addEventListener('click', async () => {
      const q = document.getElementById('search-input').value;
      if (!q) return;
      const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1`);
      const data = await res.json();
      if (data.length > 0) pickerMap.setView([data[0].lat, data[0].lon], 15);
      else alert('Ort nicht gefunden');
    });
    document.getElementById('search-input').addEventListener('keyup', e => {
      if (e.key === 'Enter') document.getElementById('search-btn').click();
    });

    // ── ELEVATION ────────────────────────────────────
    async function getElevation(lat, lng) {
      const res = await fetch(`https://api.open-meteo.com/v1/elevation?latitude=${lat}&longitude=${lng}`);
      const data = await res.json();
      const elev = data.elevation?.[0];
      if (elev === undefined || elev === null) throw new Error('Keine Elevation');
      return elev;
    }

    // ── WINDRAD ENTITY ERSTELLEN ─────────────────────
    function createWindradEntity(lat, lng, elevDiff, hubHeight, bladeLength) {
      const scene = document.querySelector('a-scene');

      const root = document.createElement('a-entity');
      root.setAttribute('gps-entity-place',
        `latitude: ${lat}; longitude: ${lng}; altitude: ${elevDiff}`);

      // Mast
      const mast = document.createElement('a-cylinder');
      mast.setAttribute('gradient-mast', '');
      mast.setAttribute('radius', '2.5');
      mast.setAttribute('height', hubHeight);
      mast.setAttribute('position', `0 ${hubHeight / 2} 0`);
      root.appendChild(mast);

      // Gondel + Rotor Wrapper (Y-Rotation)
      const gondelWrapper = document.createElement('a-entity');
      gondelWrapper.setAttribute('position', `0 ${hubHeight} 0`);
      gondelWrapper.setAttribute('animation',
        'property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear');

      // Gondel
      const gondel = document.createElement('a-box');
      gondel.setAttribute('color', 'gray');
      gondel.setAttribute('width', '10');
      gondel.setAttribute('height', '6');
      gondel.setAttribute('depth', '6');
      gondel.setAttribute('position', '0 0 0');
      gondelWrapper.appendChild(gondel);

      // Rotor (Z-Rotation)
      const rotor = document.createElement('a-entity');
      rotor.setAttribute('animation',
        'property: rotation; to: 0 0 360; loop: true; dur: 18000; easing: linear');

      [0, 120, 240].forEach(angle => {
        const blattWrapper = document.createElement('a-entity');
        blattWrapper.setAttribute('rotation', `0 0 ${angle}`);
        const blatt = document.createElement('a-sphere');
        blatt.setAttribute('color', 'white');
        blatt.setAttribute('radius', '1');
        blatt.setAttribute('scale', `2.5 ${bladeLength / 2} 1.2`);
        blatt.setAttribute('position', `0 ${bladeLength / 2} 0`);
        blattWrapper.appendChild(blatt);
        rotor.appendChild(blattWrapper);
      });

      gondelWrapper.appendChild(rotor);
      root.appendChild(gondelWrapper);
      scene.appendChild(root);
    }

    // ── AR STARTEN ───────────────────────────────────
    document.getElementById('btn-ar-start').addEventListener('click', async () => {
      if (!currentLatLng) return;
      windraeder.push(currentLatLng);

      const { hubHeight, bladeLength } = getSettings();

      document.getElementById('map-screen').style.display = 'none';
      document.getElementById('ar-screen').style.display = 'block';

      const scene = document.querySelector('a-scene');
      const doCreate = async () => {
        for (const w of windraeder) {
          let windradElev = 0;
          try { windradElev = await getElevation(w.lat, w.lng); } catch {}
          const elevDiff = windradElev - (userElevation ?? windradElev);
          createWindradEntity(w.lat, w.lng, elevDiff, hubHeight, bladeLength);
        }
      };
      if (scene.hasLoaded) doCreate();
      else scene.addEventListener('loaded', doCreate);

      // ── MINIMAP ──────────────────────────────────
      const map = L.map('minimap', {
        zoomControl: false, attributionControl: false,
        dragging: false, scrollWheelZoom: false,
        doubleClickZoom: false, touchZoom: false
      }).setView([windraeder[0].lat, windraeder[0].lng], 14);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

      windraeder.forEach(w => {
        L.marker([w.lat, w.lng], {
          icon: L.divIcon({ html: '🌀', iconSize: [24,24], className: '' })
        }).addTo(map);
      });

      let userMarker = null, line = null, heading = 0;

      function bearingTo(lat1, lng1, lat2, lng2) {
        const toRad = d => d * Math.PI / 180;
        const dLng = toRad(lng2 - lng1);
        const y = Math.sin(dLng) * Math.cos(toRad(lat2));
        const x = Math.cos(toRad(lat1)) * Math.sin(toRad(lat2)) -
                  Math.sin(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.cos(dLng);
        return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
      }

      function distanceTo(lat1, lng1, lat2, lng2) {
        const R = 6371000;
        const toRad = d => d * Math.PI / 180;
        const dLat = toRad(lat2 - lat1);
        const dLng = toRad(lng2 - lng1);
        const a = Math.sin(dLat/2)**2 +
                  Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng/2)**2;
        return Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
      }

      function makeUserIcon(deg) {
        return L.divIcon({
          html: `<div style="width:0;height:0;
            border-left:8px solid transparent;
            border-right:8px solid transparent;
            border-bottom:22px solid #007aff;
            transform:rotate(${deg}deg);
            transform-origin:50% 100%;
            position:relative;top:-11px;"></div>`,
          iconSize: [16,22], iconAnchor: [8,11], className: ''
        });
      }

      window.addEventListener('deviceorientationabsolute', e => {
        if (e.alpha !== null) heading = (360 - e.alpha) % 360;
        if (userMarker) userMarker.setIcon(makeUserIcon(heading));
      });
      window.addEventListener('deviceorientation', e => {
        if (e.webkitCompassHeading !== undefined) heading = e.webkitCompassHeading;
        else if (e.alpha !== null) heading = (360 - e.alpha) % 360;
        if (userMarker) userMarker.setIcon(makeUserIcon(heading));
      });

      navigator.geolocation.watchPosition(pos => {
        const { latitude, longitude, accuracy, altitude } = pos.coords;

        if (userElevation === null) {
          if (altitude !== null) userElevation = altitude;
          else getElevation(latitude, longitude).then(e => userElevation = e);
        }

        const nearest = windraeder.reduce((best, w) => {
          const d = distanceTo(latitude, longitude, w.lat, w.lng);
          return d < best.d ? { w, d } : best;
        }, { w: windraeder[0], d: Infinity });

        const bearing = bearingTo(latitude, longitude, nearest.w.lat, nearest.w.lng);
        const diff = Math.round(((bearing - heading + 540) % 360) - 180);
        const hinweis = Math.abs(diff) < 20 ? '✅ Blickrichtung passt!' :
                        diff > 0 ? `➡️ ${Math.abs(diff)}° nach rechts` :
                                   `⬅️ ${Math.abs(diff)}° nach links`;
        const rotorDurchmesser = bladeLength * 2;

        document.getElementById('status').innerHTML =
          `📍 GPS ±${Math.round(accuracy)}m<br>` +
          `🌀 ${windraeder.length} Windräder | Nächstes: ${nearest.d}m<br>` +
          `🧭 Nächstes bei: ${Math.round(bearing)}° | Du: ${Math.round(heading)}°<br>` +
          `🏗 Nabe: ${hubHeight}m | Rotor: ${rotorDurchmesser}m ⌀<br>` +
          hinweis;

        if (!userMarker) {
          userMarker = L.marker([latitude, longitude], { icon: makeUserIcon(heading) }).addTo(map);
        } else {
          userMarker.setLatLng([latitude, longitude]);
          userMarker.setIcon(makeUserIcon(heading));
        }

        if (line) map.removeLayer(line);
        line = L.polyline([[latitude, longitude], [nearest.w.lat, nearest.w.lng]],
          { color: 'red', weight: 2 }).addTo(map);
        const bounds = [[latitude, longitude], ...windraeder.map(w => [w.lat, w.lng])];
        map.fitBounds(bounds, { padding: [20,20] });

      }, err => {
        document.getElementById('status').innerHTML = `❌ GPS Fehler: ${err.message}`;
      }, { enableHighAccuracy: true, maximumAge: 0 });
    });
  </script>
</body>
</html>
