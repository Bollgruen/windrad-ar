<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Windrad AR</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    body { margin: 0; overflow: hidden; font-family: sans-serif; }

    /* ── KARTEN-SCREEN ── */
    #map-screen {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
    }
    #picker-map {
      flex: 1;
    }
    #map-toolbar {
      background: #1c1c1e;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    #search-row {
      display: flex;
      gap: 8px;
    }
    #search-input {
      flex: 1;
      padding: 8px 12px;
      border-radius: 8px;
      border: none;
      font-size: 15px;
      background: #2c2c2e;
      color: white;
    }
    #search-input::placeholder { color: #888; }
    #search-btn {
      padding: 8px 14px;
      border-radius: 8px;
      border: none;
      background: #007aff;
      color: white;
      font-size: 15px;
    }
    #coords-display {
      color: #aaa;
      font-size: 13px;
      text-align: center;
      min-height: 18px;
    }
    #ok-btn {
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #34c759;
      color: white;
      font-size: 17px;
      font-weight: bold;
      display: none;
    }
    #hint {
      color: #888;
      font-size: 13px;
      text-align: center;
    }

    /* ── AR SCREEN ── */
    #minimap {
      position: fixed;
      top: 10px;
      right: 10px;
      width: 180px;
      height: 180px;
      border: 2px solid white;
      border-radius: 8px;
      overflow: hidden;
      z-index: 9999;
    }
    #status {
      position: fixed;
      bottom: 10px;
      left: 10px;
      background: rgba(0,0,0,0.6);
      color: white;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 13px;
      z-index: 9999;
    }
    #change-btn {
      position: fixed;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.6);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 13px;
      z-index: 9999;
    }
  </style>
</head>
<body>

  <!-- KARTEN-SCREEN -->
  <div id="map-screen">
    <div id="picker-map"></div>
    <div id="map-toolbar">
      <div id="search-row">
        <input id="search-input" type="text" placeholder="Ort suchen z.B. Schäftlarn...">
        <button id="search-btn">🔍</button>
      </div>
      <div id="coords-display">Tippe auf die Karte um das Windrad zu platzieren</div>
      <button id="ok-btn">✅ AR starten</button>
      <div id="hint">Zum Zoomen: zwei Finger</div>
    </div>
  </div>

  <!-- AR SCREEN (versteckt bis OK) -->
  <div id="ar-screen" style="display:none;">
    <a-scene
      vr-mode-ui="enabled: false"
      arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false"
    >
      <a-camera gps-camera rotation-reader></a-camera>
      <a-entity id="windrad-entity">
        <a-cylinder color="white" radius="2.5" height="175" position="0 87.5 0"></a-cylinder>
        <a-box color="gray" width="10" height="6" depth="6" position="0 178 0"></a-box>
        <a-box color="white" width="2" height="86" depth="0.8" position="0 221 0"></a-box>
        <a-box color="white" width="2" height="86" depth="0.8" position="0 221 0" rotation="0 0 120"></a-box>
        <a-box color="white" width="2" height="86" depth="0.8" position="0 221 0" rotation="0 0 240"></a-box>
      </a-entity>
    </a-scene>
    <div id="minimap"></div>
    <div id="status">📍 GPS: warte...</div>
    <button id="change-btn">📍 Neu platzieren</button>
  </div>

  <script>
    let WINDRAD = null;
    let pickerMarker = null;
    let windradElevation = null;
    let userElevation = null;
    let windradPlaced = false;

    // ── PICKER MAP ───────────────────────────────────
    const pickerMap = L.map('picker-map').setView([47.97, 11.45], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(pickerMap);

    // Eigene Position zentrieren
    navigator.geolocation.getCurrentPosition(pos => {
      pickerMap.setView([pos.coords.latitude, pos.coords.longitude], 14);
    });

    pickerMap.on('click', e => {
      const { lat, lng } = e.latlng;
      WINDRAD = { lat, lng };

      if (pickerMarker) pickerMarker.setLatLng([lat, lng]);
      else pickerMarker = L.marker([lat, lng]).addTo(pickerMap);

      document.getElementById('coords-display').textContent =
        `📍 ${lat.toFixed(5)}, ${lng.toFixed(5)}`;
      document.getElementById('ok-btn').style.display = 'block';
      document.getElementById('hint').style.display = 'none';
    });

    // Suche
    document.getElementById('search-btn').addEventListener('click', async () => {
      const q = document.getElementById('search-input').value;
      if (!q) return;
      const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1`);
      const data = await res.json();
      if (data.length > 0) {
        pickerMap.setView([data[0].lat, data[0].lon], 15);
      } else {
        alert('Ort nicht gefunden');
      }
    });
    document.getElementById('search-input').addEventListener('keyup', e => {
      if (e.key === 'Enter') document.getElementById('search-btn').click();
    });

    // ── OK → AR STARTEN ─────────────────────────────
    document.getElementById('ok-btn').addEventListener('click', startAR);
    document.getElementById('change-btn').addEventListener('click', () => {
      document.getElementById('ar-screen').style.display = 'none';
      document.getElementById('map-screen').style.display = 'flex';
    });

    async function getElevation(lat, lng) {
      const res = await fetch(`https://api.open-elevation.com/api/v1/lookup?locations=${lat},${lng}`);
      const data = await res.json();
      return data.results[0].elevation;
    }

    function placeWindrad() {
      if (windradPlaced) return;
      if (windradElevation === null || userElevation === null) return;
      const elevationDiff = windradElevation - userElevation;
      const scene = document.querySelector('a-scene');
      const doPlace = () => {
        document.querySelector('#windrad-entity').setAttribute(
          'gps-entity-place',
          `latitude: ${WINDRAD.lat}; longitude: ${WINDRAD.lng}; altitude: ${elevationDiff}`
        );
        windradPlaced = true;
      };
      if (scene.hasLoaded) doPlace();
      else scene.addEventListener('loaded', doPlace);
    }

async function startAR() {
      // Reset für Neu-Platzierung
      windradPlaced = false;
      windradElevation = null;
      userElevation = null;
    
      document.getElementById('map-screen').style.display = 'none';
      document.getElementById('ar-screen').style.display = 'block';
    
      // Koordinaten sofort direkt setzen (A-Scene läuft schon)
      const scene = document.querySelector('a-scene');
      const doPlace = () => {
        document.querySelector('#windrad-entity').setAttribute(
          'gps-entity-place',
          `latitude: ${WINDRAD.lat}; longitude: ${WINDRAD.lng}; altitude: 0`
        );
        windradPlaced = true;
      };
      if (scene.hasLoaded) doPlace();
      else scene.addEventListener('loaded', doPlace);
    
      // Dann Elevation nachholen und korrigieren
      try {
        windradElevation = await getElevation(WINDRAD.lat, WINDRAD.lng);
        windradPlaced = false; // nochmal setzen mit korrekter Höhe
        placeWindrad();
      } catch {
        windradElevation = 0;
      }
      placeWindrad();

      // ── MINIMAP ────────────────────────────────────
      const map = L.map('minimap', {
        zoomControl: false, attributionControl: false,
        dragging: false, scrollWheelZoom: false,
        doubleClickZoom: false, touchZoom: false
      }).setView([WINDRAD.lat, WINDRAD.lng], 14);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
      const windradIcon = L.divIcon({ html: '🌀', iconSize: [24,24], className: '' });
      L.marker([WINDRAD.lat, WINDRAD.lng], { icon: windradIcon }).addTo(map);

      let userMarker = null, line = null, heading = 0;

      function bearingTo(lat1, lng1, lat2, lng2) {
        const toRad = d => d * Math.PI / 180;
        const dLng = toRad(lng2 - lng1);
        const y = Math.sin(dLng) * Math.cos(toRad(lat2));
        const x = Math.cos(toRad(lat1)) * Math.sin(toRad(lat2)) -
                  Math.sin(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.cos(dLng);
        return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
      }

      function distanceTo(lat1, lng1, lat2, lng2) {
        const R = 6371000;
        const toRad = d => d * Math.PI / 180;
        const dLat = toRad(lat2 - lat1);
        const dLng = toRad(lng2 - lng1);
        const a = Math.sin(dLat/2)**2 +
                  Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng/2)**2;
        return Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
      }

      function makeUserIcon(deg) {
        return L.divIcon({
          html: `<div style="width:0;height:0;
            border-left:8px solid transparent;
            border-right:8px solid transparent;
            border-bottom:22px solid #007aff;
            transform:rotate(${deg}deg);
            transform-origin:50% 100%;
            position:relative;top:-11px;"></div>`,
          iconSize: [16,22], iconAnchor: [8,11], className: ''
        });
      }

      window.addEventListener('deviceorientationabsolute', e => {
        if (e.alpha !== null) heading = (360 - e.alpha) % 360;
        if (userMarker) userMarker.setIcon(makeUserIcon(heading));
      });
      window.addEventListener('deviceorientation', e => {
        if (e.webkitCompassHeading !== undefined) heading = e.webkitCompassHeading;
        else if (e.alpha !== null) heading = (360 - e.alpha) % 360;
        if (userMarker) userMarker.setIcon(makeUserIcon(heading));
      });

      navigator.geolocation.watchPosition(pos => {
        const { latitude, longitude, accuracy, altitude } = pos.coords;

        if (userElevation === null) {
          userElevation = altitude ?? 0;
          placeWindrad();
        }

        const bearing = bearingTo(latitude, longitude, WINDRAD.lat, WINDRAD.lng);
        const distance = distanceTo(latitude, longitude, WINDRAD.lat, WINDRAD.lng);
        const diff = Math.round(((bearing - heading + 540) % 360) - 180);
        const hinweis = Math.abs(diff) < 20 ? '✅ Blickrichtung passt!' :
                        diff > 0 ? `➡️ ${Math.abs(diff)}° nach rechts` :
                                   `⬅️ ${Math.abs(diff)}° nach links`;
        const elevDiff = windradElevation !== null && userElevation !== null
          ? `⛰️ Windrad: ${Math.round(windradElevation)}m | Du: ${Math.round(userElevation)}m | Diff: ${Math.round(windradElevation - userElevation)}m<br>` : '';

        document.getElementById('status').innerHTML =
          `📍 GPS ±${Math.round(accuracy)}m<br>` +
          `📏 Windrad: ${distance}m entfernt<br>` +
          `🧭 Windrad bei: ${Math.round(bearing)}° | Du: ${Math.round(heading)}°<br>` +
          elevDiff + hinweis;

        if (!userMarker) {
          userMarker = L.marker([latitude, longitude], { icon: makeUserIcon(heading) }).addTo(map);
        } else {
          userMarker.setLatLng([latitude, longitude]);
          userMarker.setIcon(makeUserIcon(heading));
        }

        if (line) map.removeLayer(line);
        line = L.polyline([[latitude, longitude], [WINDRAD.lat, WINDRAD.lng]],
          { color: 'red', weight: 2 }).addTo(map);
        map.fitBounds([[latitude, longitude], [WINDRAD.lat, WINDRAD.lng]],
          { padding: [20,20] });

      }, err => {
        document.getElementById('status').innerHTML = `❌ GPS Fehler: ${err.message}`;
      }, { enableHighAccuracy: true, maximumAge: 0 });
    }
  </script>
</body>
</html>
