<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Windrad AR</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    #minimap {
      position: fixed;
      top: 10px;
      right: 10px;
      width: 180px;
      height: 180px;
      border: 2px solid white;
      border-radius: 8px;
      overflow: hidden;
      z-index: 9999;
    }
    #status {
      position: fixed;
      bottom: 10px;
      left: 10px;
      background: rgba(0,0,0,0.6);
      color: white;
      padding: 8px 12px;
      border-radius: 8px;
      font-family: sans-serif;
      font-size: 13px;
      z-index: 9999;
    }
  </style>
</head>
<body style="margin:0; overflow:hidden;">

  <a-scene
    vr-mode-ui="enabled: false"
    arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false"
  >
    <a-camera gps-camera rotation-reader></a-camera>
    <a-entity id="windrad-entity">
      <a-cylinder color="white" radius="2.5" height="175" position="0 87.5 0"></a-cylinder>
      <a-box color="gray" width="10" height="6" depth="6" position="0 178 0"></a-box>
      <a-box color="white" width="2" height="86" depth="0.8" position="0 221 0"></a-box>
      <a-box color="white" width="2" height="86" depth="0.8" position="0 221 0" rotation="0 0 120"></a-box>
      <a-box color="white" width="2" height="86" depth="0.8" position="0 221 0" rotation="0 0 240"></a-box>
    </a-entity>
  </a-scene>

  <div id="minimap"></div>
  <div id="status">📍 GPS: warte...</div>

  <script>
    // ── NUR HIER ÄNDERN ──────────────────────────────
    const WINDRAD = { lat: 47.9789, lng: 11.4495 };
    // ────────────────────────────────────────────────

    let windradElevation = null;
    let userElevation = null;
    let windradPlaced = false;

    // Höhe des Windrad-Standorts von API holen
    async function getElevation(lat, lng) {
      const res = await fetch(
        `https://api.open-elevation.com/api/v1/lookup?locations=${lat},${lng}`
      );
      const data = await res.json();
      return data.results[0].elevation;
    }

    // Windrad platzieren sobald beide Höhen bekannt sind
    function placeWindrad() {
      if (windradPlaced) return;
      if (windradElevation === null || userElevation === null) return;
    
      const elevationDiff = windradElevation - userElevation;
      const scene = document.querySelector('a-scene');
    
      const doPlace = () => {
        document.querySelector('#windrad-entity').setAttribute(
          'gps-entity-place',
          `latitude: ${WINDRAD.lat}; longitude: ${WINDRAD.lng}; altitude: ${elevationDiff}`
        );
        windradPlaced = true;
      };
    
      // Szene schon geladen? Direkt setzen. Sonst warten.
      if (scene.hasLoaded) {
        doPlace();
      } else {
        scene.addEventListener('loaded', doPlace);
      }
    }

    // Windrad-Elevation sofort beim Laden holen
    getElevation(WINDRAD.lat, WINDRAD.lng).then(elev => {
      windradElevation = elev;
      document.getElementById('status').innerHTML += `<br>⛰️ Windrad-Standort: ${elev}m ü.M.`;
      placeWindrad();
    }).catch(() => {
      document.getElementById('status').innerHTML += `<br>⚠️ Elevation API nicht erreichbar`;
      // Fallback: kein Höhenoffset
      windradElevation = 0;
      userElevation = 0;
      placeWindrad();
    });

    // ── MINIMAP ─────────────────────────────────────
    const map = L.map('minimap', {
      zoomControl: false,
      attributionControl: false,
      dragging: false,
      scrollWheelZoom: false,
      doubleClickZoom: false,
      touchZoom: false
    }).setView([WINDRAD.lat, WINDRAD.lng], 14);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    const windradIcon = L.divIcon({ html: '🌀', iconSize: [24,24], className: '' });
    L.marker([WINDRAD.lat, WINDRAD.lng], { icon: windradIcon }).addTo(map);

    let userMarker = null;
    let line = null;
    let heading = 0;

    function bearingTo(lat1, lng1, lat2, lng2) {
      const toRad = d => d * Math.PI / 180;
      const dLng = toRad(lng2 - lng1);
      const y = Math.sin(dLng) * Math.cos(toRad(lat2));
      const x = Math.cos(toRad(lat1)) * Math.sin(toRad(lat2)) -
                Math.sin(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.cos(dLng);
      return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
    }

    function distanceTo(lat1, lng1, lat2, lng2) {
      const R = 6371000;
      const toRad = d => d * Math.PI / 180;
      const dLat = toRad(lat2 - lat1);
      const dLng = toRad(lng2 - lng1);
      const a = Math.sin(dLat/2)**2 +
                Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng/2)**2;
      return Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
    }

    function makeUserIcon(deg) {
      return L.divIcon({
        html: `<div style="
          width:0; height:0;
          border-left: 8px solid transparent;
          border-right: 8px solid transparent;
          border-bottom: 22px solid #007aff;
          transform: rotate(${deg}deg);
          transform-origin: 50% 100%;
          position: relative; top: -11px;
        "></div>`,
        iconSize: [16, 22],
        iconAnchor: [8, 11],
        className: ''
      });
    }

    // Kompass
    window.addEventListener('deviceorientationabsolute', e => {
      if (e.alpha !== null) heading = (360 - e.alpha) % 360;
      if (userMarker) userMarker.setIcon(makeUserIcon(heading));
    });
    window.addEventListener('deviceorientation', e => {
      if (e.webkitCompassHeading !== undefined) heading = e.webkitCompassHeading;
      else if (e.alpha !== null) heading = (360 - e.alpha) % 360;
      if (userMarker) userMarker.setIcon(makeUserIcon(heading));
    });

    // GPS
    navigator.geolocation.watchPosition(pos => {
      const { latitude, longitude, accuracy, altitude } = pos.coords;

      // User-Elevation: GPS-Wert wenn vorhanden, sonst API
      if (userElevation === null) {
        if (altitude !== null) {
          userElevation = altitude;
          placeWindrad();
        } else {
          getElevation(latitude, longitude).then(elev => {
            userElevation = elev;
            placeWindrad();
          });
        }
      }

      const bearing = bearingTo(latitude, longitude, WINDRAD.lat, WINDRAD.lng);
      const distance = distanceTo(latitude, longitude, WINDRAD.lat, WINDRAD.lng);
      const diff = Math.round(((bearing - heading + 540) % 360) - 180);
      const hinweis = Math.abs(diff) < 20 ? '✅ Blickrichtung passt!' :
                      diff > 0 ? `➡️ ${Math.abs(diff)}° nach rechts` :
                                 `⬅️ ${Math.abs(diff)}° nach links`;

      const elevDiff = windradElevation !== null && userElevation !== null
        ? `⛰️ Höhenunterschied: ${Math.round(windradElevation - userElevation)}m<br>` : '';

      document.getElementById('status').innerHTML =
        `📍 GPS ±${Math.round(accuracy)}m<br>` +
        `📏 Windrad: ${distance}m entfernt<br>` +
        `🧭 Windrad bei: ${Math.round(bearing)}° | Du: ${Math.round(heading)}°<br>` +
        elevDiff +
        hinweis;

      if (!userMarker) {
        userMarker = L.marker([latitude, longitude], { icon: makeUserIcon(heading) }).addTo(map);
      } else {
        userMarker.setLatLng([latitude, longitude]);
        userMarker.setIcon(makeUserIcon(heading));
      }

      if (line) map.removeLayer(line);
      line = L.polyline([[latitude, longitude], [WINDRAD.lat, WINDRAD.lng]],
        { color: 'red', weight: 2 }).addTo(map);

      map.fitBounds([[latitude, longitude], [WINDRAD.lat, WINDRAD.lng]],
        { padding: [20, 20] });

    }, err => {
      document.getElementById('status').innerHTML = `❌ GPS Fehler: ${err.message}`;
    }, { enableHighAccuracy: true, maximumAge: 0 });
  </script>
</body>
</html>
