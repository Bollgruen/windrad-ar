<!DOCTYPE html>
<html>
<head>
  <title>Windrad AR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin:0; overflow:hidden;">
  <a-scene
    vr-mode-ui="enabled: false"
    arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false"
  >
    <a-camera gps-camera rotation-reader></a-camera>
    
<!-- Windrad -->
<a-entity gps-entity-place="latitude: 47.973; longitude: 11.420">
  <!-- Turm -->
  <a-cylinder color="white" radius="2" height="100" position="0 50 0"></a-cylinder>
  <!-- Gondel -->
  <a-box color="gray" width="8" height="5" depth="5" position="0 103 0"></a-box>
  <!-- Blatt 1 -->
  <a-box color="white" width="1.5" height="45" depth="0.5" position="0 126 0"></a-box>
  <!-- Blatt 2 -->
  <a-box color="white" width="1.5" height="45" depth="0.5" position="0 126 0" rotation="0 0 120"></a-box>
  <!-- Blatt 3 -->
  <a-box color="white" width="1.5" height="45" depth="0.5" position="0 126 0" rotation="0 0 240"></a-box>
</a-entity>

  </a-scene>
</body>
</html>
